name: Deploy to GitHub Pages

# Public frontend deployment only.
# Supabase functions, migrations, and production backend deploys live in the
# private repo `malabarbamba/2k2go-backend-private`.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Supabase runtime config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          node -e "const fs=require('fs');const path='public/runtime-config.json';const config=JSON.parse(fs.readFileSync(path,'utf8'));const required={SUPABASE_URL:process.env.SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY:process.env.SUPABASE_PUBLISHABLE_KEY};for (const [key,value] of Object.entries(required)){if(!value||!value.trim()){throw new Error('Missing required GitHub Actions secret: '+key);}}config.SUPABASE_URL=required.SUPABASE_URL.trim();config.SUPABASE_PUBLISHABLE_KEY=required.SUPABASE_PUBLISHABLE_KEY.trim();fs.writeFileSync(path,JSON.stringify(config,null,2)+'\n');"

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
